[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vbot"
version = "0.1.0"
requires-python = ">=3.11"

[project.optional-dependencies]
server  = ["fastapi", "uvicorn[standard]", "websockets"]
cli     = ["rich", "httpx"]
desktop = ["pywebview", "httpx"]
dev     = ["pytest", "ruff", "mypy", "hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["core", "server", "cli", "desktop"]
